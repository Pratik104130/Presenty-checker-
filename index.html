<!DOCTYPE html>
<html>
<head>
<title>Smart Login PRO MAX</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
overflow:hidden;
height:100vh;
}

/* FULL SCREEN FIX */
html,body{
height:100%;
width:100%;
}

/* PARTICLES */
canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* CENTER */
.container{
height:100vh;
width:100%;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* GLASS CARD */
.card{
width:100%;
max-width:360px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
padding:25px;
border-radius:25px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.6);
animation:fade 0.6s ease;
}

/* ANIMATION */
@keyframes fade{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}

h2{
margin-bottom:15px;
}

/* ROLE BUTTONS */
.roles{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:15px;
}

.roleBtn{
flex:1;
padding:12px;
border-radius:15px;
cursor:pointer;
background:#1e293b;
transition:0.3s;
font-size:18px;
}

.roleBtn:hover{
transform:scale(1.05);
}

.activeRole{
background:#22c55e;
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
outline:none;
background:#111;
color:white;
font-size:16px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
background:#22c55e;
color:white;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

/* FOOTER TEXT */
p{
font-size:12px;
opacity:0.6;
margin-top:10px;
}

/* HIDDEN */
.hidden{display:none;}

/* MOBILE FIX */
@media (max-width:400px){
.card{
padding:20px;
border-radius:18px;
}
.roleBtn{
font-size:16px;
padding:10px;
}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<div class="card">

<h2>🔐 Smart Login</h2>

<div class="roles">
<div id="teacherBtn" class="roleBtn activeRole" onclick="setRole('teacher')">👨‍🏫 Teacher</div>
<div id="studentBtn" class="roleBtn" onclick="setRole('student')">👨‍🎓 Student</div>
</div>

<div id="studentFields">
<input id="roll" placeholder="Roll No">
<input id="name" placeholder="Full Name">
</div>

<input id="teacherPin" placeholder="Teacher Code" class="hidden">

<button onclick="login()">Login</button>

<p>Made with ❤️ by Pratik</p>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
   apiKey: "AIzaSyDhYc_ieCicFMd1IQm6hMrvpUUx5G8ENUk",

  databaseURL:"https://presenty-pro-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

// ROLE
let currentRole = "teacher";

window.setRole = function(role){
 currentRole = role;

 document.getElementById("teacherBtn").classList.toggle("activeRole", role==="teacher");
 document.getElementById("studentBtn").classList.toggle("activeRole", role==="student");

 document.getElementById("studentFields").classList.toggle("hidden", role==="teacher");
 document.getElementById("teacherPin").classList.toggle("hidden", role==="student");
}

// AUTO LOGIN
if(localStorage.getItem("role")==="teacher") location="teacher.html";
if(localStorage.getItem("role")==="student") location="student.html";

// LOGIN
window.login = async function(){

 let roll = document.getElementById("roll").value.trim();
 let name = document.getElementById("name").value.trim();
 let pin = document.getElementById("teacherPin").value.trim();

 if(currentRole === "teacher"){
   if(pin === "9999"){
     localStorage.setItem("role","teacher");
     location="teacher.html";
   } else {
     alert("Wrong teacher code");
   }
   return;
 }

 if(!roll || !name){
   alert("Enter roll and name");
   return;
 }

 let snap = await get(ref(db,"students"));
 let data = snap.val() || {};

 for(let id in data){
   let s = data[id];

   if(s.roll == roll && s.name.toLowerCase() === name.toLowerCase()){
     localStorage.setItem("role","student");
     localStorage.setItem("userId",id);
     location="student.html";
     return;
   }
 }

 alert("Invalid login");
}

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];

for(let i=0;i<50;i++){
 particles.push({
   x:Math.random()*innerWidth,
   y:Math.random()*innerHeight,
   r:Math.random()*2,
   dx:(Math.random()-0.5)*0.5,
   dy:(Math.random()-0.5)*0.5
 });
}

function animate(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 particles.forEach(p=>{
   ctx.beginPath();
   ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
   ctx.fillStyle="rgba(255,255,255,0.5)";
   ctx.fill();

   p.x+=p.dx;
   p.y+=p.dy;

   if(p.x<0||p.x>canvas.width) p.dx*=-1;
   if(p.y<0||p.y>canvas.height) p.dy*=-1;
 });

 requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
