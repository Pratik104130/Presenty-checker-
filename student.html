<!DOCTYPE html>
<html>
<head>
<title>Student Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CLASSY FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins', sans-serif;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
margin:0;
overflow-x:hidden;
}

/* ⭐ STAR BACKGROUND */
#stars{
position:fixed;
width:100%;
height:100%;
z-index:-1;
top:0;
left:0;
}

/* HEADER */
header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
position:sticky;
top:0;
z-index:10;
}

/* CARD */
.card{
background:rgba(255,20,147,0.1);
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(255,20,147,0.3);
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

/* TODAY STATUS */
#today{
font-size:20px;
text-align:center;
padding:10px;
border-radius:12px;
}

/* CALENDAR */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day{
padding:10px;
text-align:center;
border-radius:10px;
background:#1e293b;
font-size:12px;
transition:0.3s;
}

.day:hover{
transform:scale(1.1);
}

.present{background:#22c55e;}
.absent{background:#ff2d75;}
.today{border:2px solid #ff2d75;}

/* GRAPH */
.bar{
height:20px;
background:linear-gradient(90deg,#ff2d75,#ff69b4);
border-radius:10px;
margin-top:10px;
transition:1s;
}

/* MINI CHART */
.chart{
display:flex;
gap:5px;
margin-top:10px;
flex-wrap:wrap;
}

.barMini{
width:18px;
height:50px;
background:#ff2d75;
border-radius:5px;
}

/* BUTTON */
button{
background:#ff2d75;
color:white;
border:none;
padding:8px 14px;
border-radius:8px;
cursor:pointer;
}

/* 📱 MOBILE RESPONSIVE */
@media(max-width:768px){
.card{
margin:10px;
padding:15px;
}

.calendar{
grid-template-columns:repeat(5,1fr);
}

header{
flex-direction:column;
gap:10px;
text-align:center;
}

.barMini{
width:12px;
height:40px;
}
}

@media(max-width:480px){
.calendar{
grid-template-columns:repeat(4,1fr);
}
}
</style>
</head>

<body>

<!-- ⭐ STAR CANVAS -->
<canvas id="stars"></canvas>

<header>
<h2>👨‍🎓 My Dashboard</h2>
<button onclick="logout()">Logout</button>
</header>

<div class="card">
<h3>🌸 Today Status</h3>
<div id="today"></div>
</div>

<div class="card">
<h3>📊 Attendance</h3>
<div id="stats"></div>
<div id="graph"></div>
<div class="chart" id="miniChart"></div>
</div>

<div class="card">
<h3>📆 Calendar</h3>
<div class="calendar" id="calendar"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
  apiKey: "AIzaSyDhYc_ieCicFMd1IQm6hMrvpUUx5G8ENUk",
  databaseURL:"https://presenty-pro-default-rtdb.firebaseio.com/"
});
const db = getDatabase(app);

// PROTECT
if(localStorage.getItem("role")!=="student"){
 location="index.html";
}

let userId = localStorage.getItem("userId");

// LOGOUT
window.logout=()=>{
 localStorage.clear();
 location="index.html";
}

// LOAD
async function load(){

 let snap = await get(ref(db,"attendance"));
 let data = snap.val() || {};

 let present=0,total=0;
 let calendarHTML="";
 let miniChartHTML="";

 let todayKey = new Date().toISOString().split("T")[0];
 let todayStatus="❌ Absent";

 let last7=[];

 for(let date in data){

   let dayData = data[date] || {};
   let status = dayData[userId] || "absent";

   total++;

   if(status==="present") present++;

   if(date===todayKey){
     todayStatus = status==="present" ? "✅ Present 🎉" : "❌ Absent 😢";
   }

   let className="day";
   if(status==="present") className+=" present";
   else className+=" absent";

   if(date===todayKey) className+=" today";

   let d = new Date(date).getDate();

   calendarHTML += `<div class="${className}">${d}</div>`;

   last7.push(status==="present"?1:0);
   if(last7.length>7) last7.shift();
 }

 let percent = total ? Math.round((present/total)*100) : 0;

 document.getElementById("today").innerHTML = todayStatus;

 document.getElementById("stats").innerHTML = `
 <h2>${percent}%</h2>
 <p>${present}/${total} days</p>
 `;

 document.getElementById("graph").innerHTML =
 `<div class="bar" style="width:${percent}%"></div>`;

 last7.forEach(v=>{
   miniChartHTML += `<div class="barMini" style="height:${v?50:20}px"></div>`;
 });

 document.getElementById("miniChart").innerHTML = miniChartHTML;

 document.getElementById("calendar").innerHTML = calendarHTML;
}

load();

/* ⭐ STAR ANIMATION */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for(let i=0;i<80;i++){
 stars.push({
   x:Math.random()*canvas.width,
   y:Math.random()*canvas.height,
   r:Math.random()*1.5
 });
}

function drawStars(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 stars.forEach(s=>{
   ctx.beginPath();
   ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
   ctx.fillStyle="white";
   ctx.fill();
 });

 requestAnimationFrame(drawStars);
}

drawStars();

</script>

</body>
</html>
