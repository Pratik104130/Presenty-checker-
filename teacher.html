<!DOCTYPE html>
<html>
<head>
<title>Teacher Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont;
background:radial-gradient(circle at top,#0b1220,#000);
color:#e2e8f0;
}

/* HEADER */
header{
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(56,189,248,0.2);
}

h2{
margin:0;
font-size: 20px;
font-weight:600;
}

.logout{
background:#ef4444;
color:white;
padding:8px 14px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* DATE */
#dateBox{
display:flex;
justify-content:center;
gap:10px;
margin:15px;
}

.dateBtn{
background:rgba(56,189,248,0.08);
padding:10px 15px;
border-radius:12px;
cursor:pointer;
transition:0.3s;
border:1px solid rgba(56,189,248,0.2);
}

.dateBtn:hover{
background:rgba(56,189,248,0.2);
transform:scale(1.05);
}

/* CARD */
.card{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(16px);
margin:15px;
padding:18px;
border-radius:18px;
border:1px solid rgba(56,189,248,0.15);
box-shadow:0 0 25px rgba(0,0,0,0.6);
transition:0.3s;
}

.card:hover{
transform:translateY(-2px);
border-color:rgba(239,68,68,0.4);
}

/* INPUT */
input{
padding:10px;
margin:5px;
border-radius:10px;
border:1px solid rgba(56,189,248,0.2);
background:#0a0f1c;
color:white;
width:calc(100% - 20px);
outline:none;
}

input:focus{
border-color:#38bdf8;
box-shadow:0 0 10px rgba(56,189,248,0.3);
}

/* BUTTON */
button{
padding:8px 12px;
border:none;
border-radius:10px;
cursor:pointer;
margin:2px;
transition:0.2s;
font-weight:600;
}

button:hover{
transform:scale(1.05);
}

/* COLORS */
.add{background:#FF5D5D;color:#000;}
.present{background:#22c55e;color:#000;}
.absent{background:#ef4444;color:white;}
.edit{background:#C478FF;color:#000;}
.delete{background:#fb7185;color:#000;}
.all{background:#FF4242;color:#000;}
.allp{background:#00ff00;}
.dateBtn{background:#CA9AFF;color:#000}
/* STUDENT */
.student{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px;
margin:10px 0;
background:rgba(255,255,255,0.03);
border-radius:12px;
border:1px solid rgba(56,189,248,0.1);
transition:0.3s;
}

.student:hover{
background:rgba(56,189,248,0.08);
}


/* STATS */
#stats{
font-size:18px;
margin-bottom:8px;
color:#38bdf8;
}

.progress{
height:10px;
background:#0a0f1c;
border-radius:10px;
overflow:hidden;
border:1px solid rgba(56,189,248,0.2);
}

.progress div{
height:100%;
background:linear-gradient(90deg,#38bdf8,#ef4444);
}

/* TOAST */
#toast{
position:fixed;
bottom:20px;
right:20px;
background:#38bdf8;
color:#000;
padding:10px 18px;
border-radius:10px;
display:none;
font-weight:600;
}

/* MOBILE */
@media(max-width:600px){
.student{
flex-direction:column;
align-items:flex-start;
gap:8px;
}
}
</style>
</head>

<body>

<header>
<h2>👨‍🏫 Teacher Dashboard</h2>
<button class="logout" onclick="logout()">Logout</button>
</header>

<div id="dateBox">
<div class="dateBtn" onclick="changeDate(-1)">⬅️</div>
<div class="dateBtn" id="dateText"></div>
<div class="dateBtn" onclick="changeDate(1)">➡️</div>
</div>
<div class="card">
<h3>➕ Add Student</h3>
<input id="name" placeholder="Name">
<input id="roll" placeholder="Roll No">
<button class="add" onclick="addStudent()">Add Student</button>
</div>

<div class="card">
<h3>🔍 Search</h3>
<input id="search" placeholder="Search..." oninput="loadUI()">
</div>

<div class="card">
<h3>⚡ Quick Actions</h3>
<button class="allp" onclick="markAll('present')">Mark All Present</button>
<button class="all" onclick="markAll('absent')">Mark All Absent</button>
</div>

<div class="card">
<h3>📊 Stats</h3>
<div id="stats"></div>
<div class="progress"><div id="progressBar"></div></div>
</div>

<div class="card">
<h3>📋 Students</h3>
<div id="list"></div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({
 apiKey:"AIzaSyDhYc_ieCicFMd1IQm6hMrvpUUx5G8ENUk",
 databaseURL:"https://presenty-pro-default-rtdb.firebaseio.com/"
});

const db = getDatabase(app);

if(localStorage.getItem("role")!=="teacher"){
 location="index.html";
}

const nameInput=document.getElementById("name");
const rollInput=document.getElementById("roll");
const searchInput=document.getElementById("search");
const list=document.getElementById("list");
const stats=document.getElementById("stats");
const progressBar=document.getElementById("progressBar");
const dateText=document.getElementById("dateText");

let currentDate=new Date();

function formatDate(d){return d.toISOString().split("T")[0];}

function showDate(){
dateText.innerText=currentDate.toDateString();
}

window.changeDate=(n)=>{
currentDate.setDate(currentDate.getDate()+n);
loadAttendance();
}

function toast(msg){
let t=document.getElementById("toast");
t.innerText=msg;
t.style.display="block";
setTimeout(()=>t.style.display="none",2000);
}

// LOGOUT FIX
window.logout = () => {
 localStorage.removeItem("role");
 localStorage.removeItem("userId");
 location.href = "index.html";
};

window.addStudent=()=>{
let name=nameInput.value.trim();
let roll=rollInput.value.trim();

if(!name||!roll) return alert("Fill all");

push(ref(db,"students"),{name,roll});
toast("Added");

nameInput.value="";
rollInput.value="";
}

let studentsData={},attendanceData={};

onValue(ref(db,"students"),snap=>{
studentsData=snap.val()||{};
loadAttendance();
});

async function loadAttendance(){
showDate();
let snap=await get(ref(db,"attendance/"+formatDate(currentDate)));
attendanceData=snap.val()||{};
loadUI();
}

window.loadUI=()=>{

let search=searchInput.value.toLowerCase();

let html="";
let present=0,absent=0,total=0;

for(let id in studentsData){

let s=studentsData[id];
if(!s.name.toLowerCase().includes(search)) continue;

total++;

let status=attendanceData[id];

if(status==="present") present++;
else if(status==="absent") absent++;

html+=`
<div class="student">
<span>${s.name} (${s.roll})</span>

${
status
? `<b>${status==="present"?"✅":"❌"}</b>`
:
`<div>
<button class="present" onclick="mark('${id}','present')">Present</button>
<button class="absent" onclick="mark('${id}','absent')">Absent</button>
</div>`
}

<div>
<button class="edit" onclick="editStudent('${id}','${s.name}')">Edit Name</button>
<button class="delete" onclick="deleteStudent('${id}')">Delete</button>
</div>
</div>`;
}

list.innerHTML=html;

let percent=total?Math.round((present/total)*100):0;

stats.innerHTML=`${percent}% Attendance (${present}/${total})`;

progressBar.style.width=percent+"%";
}

window.mark=(id,status)=>{
update(ref(db,"attendance/"+formatDate(currentDate)),{[id]:status});
loadAttendance();
}

window.markAll=(status)=>{
let updates={};
for(let id in studentsData) updates[id]=status;
update(ref(db,"attendance/"+formatDate(currentDate)),updates);
loadAttendance();
}

window.deleteStudent=(id)=>{
if(confirm("Delete?")) remove(ref(db,"students/"+id));
}

window.editStudent=(id,name)=>{
let n=prompt("Edit name:",name);
if(n) update(ref(db,"students/"+id),{name:n});
}

loadAttendance();
</script>

</body>
</html>
